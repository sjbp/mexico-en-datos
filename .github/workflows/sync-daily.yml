name: Daily Data Sync (Banxico + INEGI)

on:
  schedule:
    # 6:00 AM Mexico City (UTC-6) = 12:00 UTC
    - cron: '0 12 * * *'
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Sync Banxico (inflation, tipo de cambio, tasa objetivo)
        env:
          BANXICO_API_TOKEN: ${{ secrets.BANXICO_API_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: uv run python -m ingest.pipelines.banxico

      - name: Sync INEGI indicators (PIB, IGAE, employment, trade, confidence)
        env:
          INEGI_API_TOKEN: ${{ secrets.INEGI_API_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: uv run python -m ingest.pipelines.indicators
