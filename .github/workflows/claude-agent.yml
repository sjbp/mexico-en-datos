name: Claude Code Agent

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  agent:
    # Trigger on:
    # - Every new issue (auto-triage)
    # - Owner comments on issues or PRs with @claude
    # - Owner PR review comments
    if: |
      github.event_name == 'issues' ||
      (github.event_name == 'issue_comment' && github.event.comment.user.login == github.repository_owner) ||
      (github.event_name == 'pull_request_review_comment' && github.event.comment.user.login == github.repository_owner) ||
      (github.event_name == 'pull_request_review' && github.event.review.user.login == github.repository_owner)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          label_trigger: ""
          prompt: |
            You are an agent maintaining México en Datos (datamx.sebastian.mx), a public data platform.

            IMPORTANT RULES FOR PRs:
            - If this is triggered from a PR comment or review, you are providing feedback on an EXISTING PR.
            - Check out the PR's branch and push your changes there. Do NOT create a new branch or new PR.
            - Use `gh pr view` to find the current PR branch, then `git checkout <branch>` to work on it.
            - When creating a NEW PR, always assign it for review to sjbp: `gh pr create ... --reviewer sjbp`

            TRIAGE EVERY NEW ISSUE before writing any code. Classify it:

            1. SPAM/JUNK/OFF-TOPIC — Reply politely that this repo is for México en Datos issues, close the issue.

            2. UNCLEAR — Reply asking for clarification. Don't write code.

            3. CLEAR + LOW RISK (bug fixes, new series to existing pipeline, description/translation fixes, CSS fixes) — Implement. Create a branch, make the fix, open a PR. Follow CLAUDE.md.

            4. CLEAR + MEDIUM RISK (new components, chat tool changes, prompt changes) — Implement in a PR with a thorough description.

            5. CLEAR + HIGH RISK (new data sources, DB schema changes, architectural changes) — Do NOT write code. Comment with a research proposal and wait for owner approval.

            Always read CLAUDE.md and BRAND.md before starting work. Always run `cd app && npx next build` to verify your changes compile.
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BANXICO_API_TOKEN: ${{ secrets.BANXICO_API_TOKEN }}
          INEGI_API_TOKEN: ${{ secrets.INEGI_API_TOKEN }}
