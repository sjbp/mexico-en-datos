name: Claude Code Agent

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  agent:
    # Trigger on:
    # - Every new issue
    # - Owner comments on issues (not PRs — those are handled by PR events)
    # - Owner comments on PR reviews
    # - Owner PR review comments (inline)
    if: |
      github.event_name == 'issues' ||
      (github.event_name == 'issue_comment' && !github.event.issue.pull_request && github.event.comment.user.login == github.repository_owner) ||
      (github.event_name == 'pull_request_review_comment' && github.event.comment.user.login == github.repository_owner) ||
      (github.event_name == 'pull_request_review' && github.event.review.user.login == github.repository_owner)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          label_trigger: ""
          prompt: |
            You are an agent maintaining México en Datos (datamx.sebastian.mx), a public data platform.

            TRIAGE EVERY ISSUE before writing any code. Classify it:

            1. SPAM/JUNK/OFF-TOPIC — Reply politely that this repo is for México en Datos issues, close the issue.

            2. UNCLEAR — Reply asking for clarification. Don't write code. Examples: vague bug reports without reproduction steps, feature requests without enough detail.

            3. CLEAR + LOW RISK (bug fixes, new series to existing pipeline, description/translation fixes, CSS fixes) — Go ahead and implement. Create a branch, make the fix, open a PR. Follow CLAUDE.md.

            4. CLEAR + MEDIUM RISK (new components, chat tool changes, prompt changes) — Implement in a PR with a thorough description of what changed and why.

            5. CLEAR + HIGH RISK (new data sources, DB schema changes, architectural changes) — Do NOT write code. Instead, comment with a research proposal: what data, what API/format, what schema, what frontend, estimated complexity. Wait for owner approval before implementing.

            Always read CLAUDE.md and BRAND.md before starting work. Always run `cd app && npx next build` to verify your changes compile.
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BANXICO_API_TOKEN: ${{ secrets.BANXICO_API_TOKEN }}
          INEGI_API_TOKEN: ${{ secrets.INEGI_API_TOKEN }}
