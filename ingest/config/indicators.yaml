        frequency: "monthly"
        source: "BIE-BISE"
        geo_levels: [national]

      - id: "444616"
        name_es: "Tasa de subocupacion (mensual, 32 ciudades)"
        name_en: "Underemployment rate (monthly, 32 cities)"
        subtopic: "enoe"
        unit: "percent"
        frequency: "monthly"
        source: "BIE-BISE"
        geo_levels: [national]

      - id: "444620"
        name_es: "Poblacion economicamente activa PEA (mensual, 32 ciudades)"
        name_en: "Economically active population PEA (monthly, 32 cities)"
        subtopic: "enoe"
        unit: "percent"
        frequency: "monthly"
        source: "BIE-BISE"
        geo_levels: [national]

  trade:
