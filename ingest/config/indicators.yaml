  employment:
    name_es: "Empleo"
    indicators:
      # NOTE: After INEGI Dec 2025 BIE migration, these IDs were verified:
      # The catalog names are generic (e.g., "Tasa de desocupacion") but we label them
      # based on their topic context (poblacion urbana, agregado 32 ciudades).
      - id: "444612"
        name_es: "Tasa de desocupacion (mensual, 32 ciudades)"
        name_en: "Unemployment rate (monthly, 32 cities)"
        subtopic: "enoe"
        unit: "percent"
        frequency: "monthly"
        source: "BIE-BISE"
        geo_levels: [national]

      - id: "444619"
        name_es: "Tasa de informalidad laboral TIL1 (mensual, 32 ciudades)"
        name_en: "Labor informality rate TIL1 (monthly, 32 cities)"
        subtopic: "enoe"
