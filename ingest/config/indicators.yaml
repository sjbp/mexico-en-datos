topics:
  prices:
    name_es: "Precios"
    indicators:
      # NOTE: INEGI migrated INPC to a new system ("Canasta y Ponderadores 2024").
      # The old BIE indicator IDs (628194, 444612-444621) are either stale or reassigned.
      # 628194 (INPC index) is frozen at July 2024.
      # 444612-444621 were REASSIGNED to employment indicators after the Dec 2025 BIE migration.
      # Current INPC data is NOT available via the standard BIE API.
      # TODO: Integrate Banxico SIE API for inflation data (series SP68257, SP1).

      - id: "628194"
        name_es: "INPC Indice General (historico, congelado Jul 2024)"
        name_en: "Headline CPI Index (historical, frozen Jul 2024)"
        subtopic: "inpc"
        unit: "index"
        frequency: "monthly"
        source: "BIE-BISE"
        geo_levels: [national]

  economic_activity:
    name_es: "Actividad Economica"
    indicators:
      # --- GDP quarterly (this is YoY growth rate, NOT absolute value) ---
      - id: "735904"
        name_es: "PIB Crecimiento (variacion % anual, trimestral)"
        name_en: "GDP Growth (annual % change, quarterly)"
        subtopic: "pib"
        unit: "percent"
        frequency: "quarterly"
        source: "BIE-BISE"
        geo_levels: [national]

      # --- IGAE monthly ---
      - id: "736939"
        name_es: "IGAE Total (indice, mensual)"
        name_en: "IGAE Total (index, monthly)"
        subtopic: "igae"
        unit: "index"
        frequency: "monthly"
        source: "BIE-BISE"
        geo_levels: [national]

      - id: "736940"
        name_es: "IGAE Total (variacion % anual, mensual)"
        name_en: "IGAE Total (annual % change, monthly)"
        subtopic: "igae"
        unit: "percent"
        frequency: "monthly"
        source: "BIE-BISE"
        geo_levels: [national]

      - id: "736883"
        name_es: "IGAE Actividades Secundarias (indice, mensual)"
        name_en: "IGAE Secondary activities (index, monthly)"
        subtopic: "igae"
        unit: "index"
        frequency: "monthly"
        source: "BIE-BISE"
        geo_levels: [national]

      - id: "736941"
        name_es: "IGAE Actividades Primarias (indice, mensual)"
        name_en: "IGAE Primary activities (index, monthly)"
        subtopic: "igae"
        unit: "index"
        frequency: "monthly"
        source: "BIE-BISE"
