  <rect x="688" y="100" width="110" height="42" rx="21" fill="#FF9F43" opacity="0.15"/>
  <rect x="689" y="101" width="108" height="40" rx="20" stroke="#FF9F43" stroke-width="1" opacity="0.3" fill="none"/>
  <g transform="translate(704, 108)">
    <path
