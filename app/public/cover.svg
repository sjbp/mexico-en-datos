  <circle cx="1340" cy="220" r="5" fill="#FF9F43" opacity="0.10"/>
  <circle cx="1370" cy="160" r="5" fill="#FF9F43" opacity="0.14"/>
  <circle cx="1410" cy="240" r="5" fill="#FF9F43" opacity="0.08"/>
  <circle cx="1440" cy="190" r="5" fill="#FF9F43" opacity="0.12"/>
