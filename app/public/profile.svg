<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="400" height="400" rx="48" fill="#0A0A0A"/>
  <rect x="1" y="1" width="398" height="398" rx="47" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

  <!-- Subtle grid lines -->
  <line x1="80" y1="280" x2="320" y2="280" stroke="rgba(255,255,255,0.04)" stroke-width="1.5"/>
  <line x1="80" y1="230" x2="320" y2="230" stroke="rgba(255,255,255,0.04)" stroke-width="1.5"/>
  <line x1="80" y1="180" x2="320" y2="180" stroke="rgba(255,255,255,0.04)" stroke-width="1.5"/>
  <line x1="80" y1="130" x2="320" y2="130" stroke="rgba(255,255,255,0.04)" stroke-width="1.5"/>

  <!-- Rising bars -->
  <rect x="95" y="230" width="36" height="50" rx="6" fill="#FF9F43" opacity="0.5"/>
  <rect x="143" y="195" width="36" height="85" rx="6" fill="#FF9F43" opacity="0.6"/>
  <rect x="191" y="170" width="36" height="110" rx="6" fill="#FF9F43" opacity="0.75"/>
  <rect x="239" y="140" width="36" height="140" rx="6" fill="#FF9F43" opacity="0.85"/>
  <rect x="287" y="105" width="36" height="175" rx="6" fill="#FF9F43" opacity="1"/>

  <!-- Trend line connecting bar tops -->
  <polyline
    points="113,230 161,195 209,170 257,140 305,105"
    stroke="#FF9F43"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- End dot -->
  <circle cx="305" cy="105" r="6" fill="#FF9F43"/>
  <circle cx="305" cy="105" r="10" fill="#FF9F43" opacity="0.2"/>

  <!-- AI badge — large, overlapping top of bars -->
  <rect x="40" y="160" width="130" height="52" rx="26" fill="#0A0A0A"/>
  <rect x="40" y="160" width="130" height="52" rx="26" fill="#FF9F43" opacity="0.15"/>
  <rect x="41" y="161" width="128" height="50" rx="25" stroke="#FF9F43" stroke-width="1" opacity="0.3" fill="none"/>
  <g transform="translate(58, 170)">
    <path
      d="M12 2L14.9 8.6L22 9.5L17 14.1L18.2 21.1L12 17.6L5.8 21.1L7 14.1L2 9.5L9.1 8.6L12 2Z"
      stroke="#FF9F43"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
      transform="scale(1.35)"
    />
  </g>
  <text x="113" y="194" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="26" fill="#FF9F43">AI</text>

  <!-- "MX" text — bottom center, extra bold -->
  <text x="200" y="345" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="48" letter-spacing="-0.02em" fill="white">MX</text>
</svg>
